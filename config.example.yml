# ===== LLM 配置 =====
# 支持任意 OpenAI 兼容接口（OpenAI / DeepSeek / Moonshot / 火山方舟 ARK / 本地 vLLM 等）
LLM_API_KEY: ""                                        # 填你的 API key；留空则用回退生成器
LLM_BASE_URL: "https://ark.cn-beijing.volces.com/api/coding/v3"
LLM_MODEL: "ark-code-latest"                           # 或 gpt-4o-mini / deepseek-chat / moonshot-v1-8k 等
LLM_TEMPERATURE: 0.4
LLM_MAX_TOKENS: 2000
LLM_TIMEOUT: 60

# ===== 后端基础设施 =====
REDIS_URL: "redis://127.0.0.1:6379/0"
DATABASE_URL: "sqlite:///./storage/projshow.db"

# ===== 运行模式 =====
# true: 同步直跑（无需 Redis/Celery，适合本地测试）
# false: 走 Celery + Redis（生产用）
EAGER_MODE: true

# ===== 解析限制 =====
MAX_REPO_SIZE_MB: 200
CLONE_DEPTH: 1
CLONE_TIMEOUT: 120
MAX_TREE_ENTRIES: 200
MAX_README_CHARS: 8000

# ===== tForum SSO 集成 =====
# tForum 后端地址，用于调 verifyToken 校验用户 token
TFORUM_BASE_URL: "http://localhost:8081"
# 签会话 cookie 用的密钥（生产请改成随机长串）
SSO_COOKIE_SECRET: "projshow-sso-secret-change-me"
# 会话有效期（秒），默认 7 天
SSO_SESSION_TTL: 604800
# ProjectAgent 对外地址（用于在 tForum 配置外部栏目 URL）
PROJECTAGENT_PUBLIC_URL: "http://localhost:8765"
